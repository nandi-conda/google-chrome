package:
  name: google-chrome
  version: 145.0.7632.116

source:
  - url: https://dl.google.com/linux/chrome/deb/pool/main/g/google-chrome-stable/google-chrome-stable_145.0.7632.116-1_amd64.deb
    sha256: 946328a46b692e9de0d0f5487d120008d3fac916abcd00c8b2e72d35b8aa082a
    file_name: google-chrome.deb
  - path: eula_text.html
  - path: google-chrome-stable.sh

build:
  number: 0
  script:
    # Create directories
    - mkdir -p $PREFIX/bin
    - mkdir -p $PREFIX/lib/google-chrome
    - mkdir -p $PREFIX/share/icons/hicolor
    - mkdir -p $PREFIX/share/licenses/google-chrome
    - mkdir -p $PREFIX/Menu

    # Extract .deb contents to temp directory
    - mkdir -p /tmp/extract
    - ar x google-chrome.deb
    - tar -xf data.tar.xz -C /tmp/extract

    # Copy Chrome binaries to lib directory (avoid /opt symlinks)
    - cp -r /tmp/extract/opt/google/chrome/* $PREFIX/lib/google-chrome/

    # Install launcher wrapper script
    - install -m755 google-chrome-stable.sh $PREFIX/bin/google-chrome-stable

    # Install menuinst menu file
    - |
      cat << 'EOF' > $PREFIX/Menu/google-chrome.json
      {
        "menu_name": "Google Chrome",
        "menu_items": [
          {
            "name": "Google Chrome",
            "description": "Access the Internet",
            "icon": "{{ PREFIX }}/lib/google-chrome/product_logo_48.png",
            "command": ["{{ PREFIX }}/bin/google-chrome-stable"],
            "platforms": {
              "linux": {}
            }
          }
        ]
      }
      EOF

    # Install icons
    - |
      for i in 16 24 32 48 64 128 256; do
        if [ -f "$PREFIX/lib/google-chrome/product_logo_${i}.png" ]; then
          dir="$PREFIX/share/icons/hicolor/${i}x${i}/apps"
          mkdir -p "$dir"
          install -m644 "$PREFIX/lib/google-chrome/product_logo_${i}.png" "$dir/google-chrome.png"
        fi
      done

    # Install license
    - install -m644 eula_text.html $PREFIX/share/licenses/google-chrome/
    - |
      if [ -f "$PREFIX/lib/google-chrome/WidevineCdm/LICENSE" ]; then
        install -m644 "$PREFIX/lib/google-chrome/WidevineCdm/LICENSE" $PREFIX/share/licenses/google-chrome/WidevineCdm-LICENSE.txt
      fi

    # Clean up unnecessary files from the deb extraction
    - rm -rf /tmp/extract

requirements:
  build:
    - menuinst >=2
  run:
    - menuinst >=2

tests:
  - script:
      - test -f $PREFIX/lib/google-chrome/google-chrome
      - test -f $PREFIX/Menu/google-chrome.json

about:
  summary: The popular web browser by Google (Stable Channel)
  description: Google Chrome is a fast, secure, and free web browser, built for the modern web.
  homepage: https://www.google.com/chrome
  license: LicenseRef-Proprietary
  license_file: eula_text.html
  repository: https://github.com/nandi-conda/google-chrome
