name: Build and Publish

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/rattler-build-action@v0.2.34
        with:
          recipe-path: recipe.yaml
          upload-artifact: true

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: package
          path: output

      - uses: prefix-dev/rattler-build-action@v0.2.34
        with:
          recipe-path: recipe.yaml

      - name: Upload to prefix.dev
        env:
          PREFIX_API_KEY: ${{ secrets.PREFIX_API_KEY }}
        run: |
          rattler-build upload prefix --channel nandi-testing --skip-existing output/**/*.conda

  publish-pr:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: package
          path: output

      - uses: prefix-dev/rattler-build-action@v0.2.34
        with:
          recipe-path: recipe.yaml

      - name: Upload to prefix.dev (testing)
        env:
          PREFIX_API_KEY: ${{ secrets.PREFIX_API_KEY }}
        run: |
          rattler-build upload prefix --channel nandi-testing --skip-existing output/**/*.conda
