name: Build and Publish

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Add 30-minute timeout for build
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/rattler-build-action@v0.2.34
        with:
          recipe-path: recipe.yaml

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: conda-package
          path: output/**/**/*.conda

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: conda-package
          path: output

      - name: Install rattler-build
        run: |
          arch=$(uname -m)
          if [ "$arch" = "arm64" ]; then arch="aarch64"; fi
          curl -fsSL "https://github.com/prefix-dev/rattler-build/releases/latest/download/rattler-build-${arch}-unknown-linux-musl" \
            -o /usr/local/bin/rattler-build
          chmod +x /usr/local/bin/rattler-build

      - name: Upload to prefix.dev
        env:
          PREFIX_API_KEY: ${{ secrets.PREFIX_API_KEY }}
        run: |
          find output -name "*.conda" -exec rattler-build upload prefix --channel nandi-testing --skip-existing {} \;

  publish-pr:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: conda-package
          path: output

      - name: Install rattler-build
        run: |
          arch=$(uname -m)
          if [ "$arch" = "arm64" ]; then arch="aarch64"; fi
          curl -fsSL "https://github.com/prefix-dev/rattler-build/releases/latest/download/rattler-build-${arch}-unknown-linux-musl" \
            -o /usr/local/bin/rattler-build
          chmod +x /usr/local/bin/rattler-build

      - name: Upload to prefix.dev (testing)
        env:
          PREFIX_API_KEY: ${{ secrets.PREFIX_API_KEY }}
        run: |
          find output -name "*.conda" -exec rattler-build upload prefix --channel nandi-testing --skip-existing {} \;
